<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeChat Frame With Tabs</title>
    <link rel="stylesheet" href="./vendor/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="./css/global.css" />
    <link rel="stylesheet" href="./css/wechat-frame-tabs.css" />
  </head>
  <body>
    <div class="ios-frame-wrapper" role="img" aria-label="iOS device frame mockup with tabs">
      <div class="ios-screen">
        <div class="top-header-shell">
          <div class="status-bar" role="img" aria-label="iOS 状态栏"></div>
          <div class="dynamic-island" aria-hidden="true"></div>
          <div class="mini-capsule" aria-label="微信小程序胶囊按钮">
            <img class="mini-left" src="./images/mini-capsule-menu.svg" alt="" aria-hidden="true" />
            <div class="mini-divider" aria-hidden="true"></div>
            <img class="mini-right" src="./images/mini-capsule-circle.svg" alt="" aria-hidden="true" />
          </div>
        </div>
        <main class="screen-content">
          <section class="app-shell" aria-label="微信小程序模板">
            <div class="template-card">
              <h2>内容标题</h2>
              <p>这里是模板内容区，可替换为你的业务卡片、列表或表单。</p>
            </div>

              <p>这里是模板内容区，可替换为你的业务卡片、列表或表单。</p>
            </div>

              <h2>内容标题</h2>
              <p>这里是模板内容区，可替换为你的业务卡片、列表或表单。</p>
            </div>
            <div class="template-card">
              <h2>内容标题</h2>
              <p>这里是模板内容区，可替换为你的业务卡片、列表或表单。</p>
            </div>

              <p>这里是模板内容区，可替换为你的业务卡片、列表或表单。</p>
            </div>
          </section>
        </main>
        <nav class="tab-bar" aria-label="底部标签栏">
          <div class="tab-item active">
            <span class="tab-icon" aria-hidden="true"><i class="fa-solid fa-house"></i></span>
            <span>首页</span>
          </div>
          <div class="tab-item">
            <span class="tab-icon" aria-hidden="true"><i class="fa-solid fa-list-check"></i></span>
            <span>任务</span>
          </div>
          <div class="tab-item">
            <span class="tab-icon" aria-hidden="true"><i class="fa-solid fa-chart-column"></i></span>
            <span>报表</span>
          </div>
          <div class="tab-item">
            <span class="tab-icon" aria-hidden="true"><i class="fa-solid fa-circle-user"></i></span>
            <span>我的</span>
          </div>
        </nav>
        <div class="home-indicator" aria-hidden="true"></div>
      </div>
    </div>
  </body>
</html>
