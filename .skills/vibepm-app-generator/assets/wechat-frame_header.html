<!doctype html>
<html lang="zh-CN">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeChat Frame With Header</title>
    <link rel="stylesheet" href="./css/global.css" />
    <link rel="stylesheet" href="./css/wechat-frame-header.css" />
  </head>
  <body>
    <div class="ios-frame-wrapper" role="img" aria-label="iOS device frame mockup">
      <div class="ios-screen">
        <div class="top-header-shell">
          <div class="status-bar" role="img" aria-label="iOS 状态栏"></div>
          <div class="dynamic-island" aria-hidden="true"></div>
          <header class="title-bar" aria-label="页面标题">
            <div class="title-btn">返回</div>
            <h1 class="title-text">页面标题</h1>
            <div class="mini-capsule" aria-label="微信小程序胶囊按钮">
              <img class="mini-left" src="./images/mini-capsule-menu.svg" alt="" aria-hidden="true" />
              <div class="mini-divider" aria-hidden="true"></div>
              <img class="mini-right" src="./images/mini-capsule-circle.svg" alt="" aria-hidden="true" />
            </div>
          </header>
        </div>
        <main class="screen-content">
          <section class="app-shell" aria-label="微信小程序模板">
            <div class="template-card">
